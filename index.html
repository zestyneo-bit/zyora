<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZYORA | Architecture & Interior Design Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="ZYORA is an architecture and interior design studio crafting modern, functional spaces for homes, offices and commercial projects."
  />
  <style>
    :root {
      --bg: #050816;
      --bg-elevated: #0b1120;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --radius: 1.4rem;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background: radial-gradient(circle at top, #111827 0, #020617 55%);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 16px 60px;
    }

    /* Header / Nav */

    header {
      position: sticky;
      top: 10px;
      z-index: 50;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
      backdrop-filter: blur(18px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 1rem;
      background: radial-gradient(circle at 20% 0, #38bdf8, #0f172a 70%);
      border: 1px solid rgba(148, 163, 184, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .logo-text span:first-child {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .logo-text span:last-child {
      font-size: 11px;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 13px;
      align-items: center;
    }

    .nav-links a {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--muted);
    }

    .nav-links a:hover {
      border-color: rgba(148, 163, 184, 0.5);
      color: var(--text);
    }

    .btn-pill {
      padding: 7px 13px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #020617;
      box-shadow: 0 16px 40px rgba(56, 189, 248, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 55px rgba(56, 189, 248, 0.6);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--text);
    }

    /* Mobile nav */

    .nav-toggle {
      display: none;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: transparent;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    .nav-toggle span {
      display: inline-block;
      margin-left: 6px;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
        position: absolute;
        right: 12px;
        top: 52px;
        flex-direction: column;
        align-items: flex-start;
        background: rgba(15, 23, 42, 0.98);
        padding: 10px 12px;
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.4);
      }

      .nav-links.show {
        display: flex;
      }

      .nav-toggle {
        display: inline-flex;
        align-items: center;
      }
    }

    /* Layout */

    main {
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      gap: 70px;
    }

    section {
      scroll-margin-top: 90px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 22px;
    }

    .section-sub {
      font-size: 13px;
      color: var(--muted);
      max-width: 360px;
    }

    /* Hero */

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 34px;
      align-items: center;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.92);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .hero-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 14px #22c55e;
    }

    .hero h1 {
      font-size: clamp(32px, 4vw, 38px);
      line-height: 1.07;
      margin-bottom: 14px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 440px;
      margin-bottom: 22px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .hero-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .hero-meta span::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.8);
    }

    .hero-visual {
      border-radius: var(--radius);
      background: radial-gradient(circle at 0 0, #38bdf8 0, #020617 40%);
      padding: 18px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-visual-inner {
      border-radius: 1.1rem;
      background: linear-gradient(145deg, #020617, #020617 35%, #020617 100%);
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 250px;
    }

    .hero-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .hero-dots {
      display: flex;
      gap: 5px;
    }

    .hero-dots span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #1f2937;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .hero-main-img {
      border-radius: 1rem;
      background-image: url("https://images.pexels.com/photos/6585763/pexels-photo-6585763.jpeg?auto=compress&cs=tinysrgb&w=1200");
      background-size: cover;
      background-position: center;
      min-height: 190px;
    }

    .hero-side {
      display: grid;
      gap: 10px;
    }

    .hero-tag {
      padding: 7px 9px;
      border-radius: 0.9rem;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 11px;
      color: var(--muted);
    }

    .hero-tag strong {
      display: block;
      color: var(--text);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .hero-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 0.9rem;
      background: linear-gradient(
        135deg,
        rgba(56, 189, 248, 0.2),
        rgba(15, 23, 42, 0.96)
      );
      border: 1px solid rgba(56, 189, 248, 0.5);
      font-size: 11px;
    }

    .hero-stat strong {
      font-size: 18px;
    }

    .hero-float {
      position: absolute;
      bottom: 16px;
      left: 18px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.6);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .hero-float span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.9);
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* Grids */

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    @media (max-width: 800px) {
      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .grid-3,
      .grid-2 {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* Cards */

    .card {
      padding: 16px;
      border-radius: 1.1rem;
      background: radial-gradient(circle at top, #020617 0, #020617 55%);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.85);
    }

    .card h3 {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 11px;
      color: var(--muted);
    }

    /* Projects */

    .project-img {
      border-radius: 0.9rem;
      height: 160px;
      background-size: cover;
      background-position: center;
      margin-bottom: 10px;
    }

    .project-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* About / Process */

    .about-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.9fr);
      gap: 18px;
    }

    .about-layout p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .about-list {
      list-style: none;
      font-size: 13px;
      color: var(--muted);
    }

    .about-list li::before {
      content: "• ";
      color: var(--accent);
    }

    .process-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .process-step {
      padding: 10px 11px;
      border-radius: 0.9rem;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(55, 65, 81, 0.9);
      font-size: 12px;
    }

    .process-step span {
      display: inline-block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .process-step strong {
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .about-layout {
        grid-template-columns: minmax(0, 1fr);
      }

      .process-steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 550px) {
      .process-steps {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* Testimonials */

    .testimonial {
      font-size: 13px;
      color: var(--muted);
    }

    .testimonial-footer {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }

    /* Contact */

    .contact-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 18px;
    }

    @media (max-width: 850px) {
      .contact-layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    form {
      display: grid;
      gap: 10px;
      font-size: 13px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
      display: block;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 0.8rem;
      border: 1px solid rgba(55, 65, 81, 0.9);
      background: #020617;
      color: var(--text);
      font-size: 13px;
      resize: vertical;
      min-height: 40px;
    }

    input:focus,
    textarea:focus {
      outline: 1px solid var(--accent);
      border-color: var(--accent);
    }

    .contact-card {
      padding: 14px;
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(55, 65, 81, 0.9);
      font-size: 13px;
      color: var(--muted);
      display: grid;
      gap: 8px;
    }

    .contact-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }

    .contact-item span:first-child {
      color: var(--text);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: var(--accent);
    }

    /* Footer */

    footer {
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid rgba(31, 41, 55, 0.9);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
    }

    footer a {
      color: var(--accent);
      font-size: 12p
