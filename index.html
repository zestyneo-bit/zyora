<script>
  // Mobile nav toggle
  const navToggle = document.getElementById("navToggle");
  const navLinks = document.getElementById("navLinks");

  if (navToggle) {
    navToggle.addEventListener("click", () => {
      navLinks.classList.toggle("show");
    });
  }

  // Close nav on link click (mobile)
  navLinks?.querySelectorAll("a").forEach((link) => {
    link.addEventListener("click", () => {
      navLinks.classList.remove("show");
    });
  });

  // Year in footer
  const yearEl = document.getElementById("year");
  if (yearEl) {
    yearEl.textContent = new Date().getFullYear().toString();
  }

  // Contact form → Google Apps Script
  const form = document.getElementById("contact-form");
  const scriptURL =
    "https://script.google.com/macros/s/AKfycbxEzj1Bpjqr89GtlPXXB1mDsvmkr1rYwUYQz2oIm0Cdqq5WOQIVGvF6mh_R7P1pVOnu/exec";

  if (form && scriptURL) {
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const submitButton = form.querySelector("button[type='submit']");
      const originalText = submitButton.textContent;
      submitButton.textContent = "Sending...";
      submitButton.disabled = true;

      try {
        const formData = new FormData(form);

        // no-cors avoids browser blocking the request
        await fetch(scriptURL, {
          method: "POST",
          body: formData,
          mode: "no-cors",
        });

        alert("Thank you! Your enquiry has been sent.");
        form.reset();
      } catch (err) {
        alert(
          "Network error. Please try again or email us directly at zestyneo@gmail.com."
        );
      } finally {
        submitButton.textContent = originalText;
        submitButton.disabled = false;
      }
    });
  }
</script>
